# evil-read-arxiv Configuration File Example
# Copy this file to config.yaml and modify for your own setup
# Or set OBSIDIAN_VAULT_PATH environment variable and place config.yaml at:
#   $OBSIDIAN_VAULT_PATH/99_System/Config/research_interests.yaml

# Language setting (zh/en)
# - "zh": Chinese reports
# - "en": English reports (default)
language: "zh"

# Obsidian Vault path (required)
# Option 1: Use environment variable (recommended)
#   export OBSIDIAN_VAULT_PATH="/path/to/your/obsidian-vault"
# Option 2: Set path directly below
vault_path: "D:\\paper-daily"

# Papers directory relative to vault (optional, default: 20_Research/Papers)
papers_dir: "20_Research/Papers"

# Semantic Scholar API Key (optional, reduces 429 rate limiting)
# Free registration: https://www.semanticscholar.org/product/api#api-key
# semantic_scholar_api_key: "your-api-key-here"

# Research interests configuration (required)
research_domains:
  # Domain names can be customized freely
  "unlearning backdoor attack":
    # Keywords for searching and matching papers
    keywords:
      - "backdoor attack"
      - "machine unlearning"
      - "backdoor defense"
      - "data deletion"
      - "security"
      - "privacy"
      - "adversarial"
      - "poisoning"
      - "trojan attack"
      
    # arXiv categories (optional)
    arxiv_categories:
      - "cs.CR"
      - "cs.LG"
      - "cs.AI"
      - "cs.CV"
    # Priority (optional, 1-10, higher = higher priority)
    priority: 5

  "Multimodal & Vision-Language":
    keywords:
      - "vision-language"
      - "multimodal"
      - "image-text"
      - "visual question answering"
      - "cross-modal"
      - "CLIP"
      - "BLIP"
      - "GPT-4V"
      - "visual grounding"
      - "image captioning"
      - "multimodal large language model"
      - "MLLM"
      - "VLM"
    arxiv_categories:
      - "cs.CV"
      - "cs.CL"
      - "cs.MM"
      - "cs.AI"
    priority: 4

  "Agents & Autonomous Systems":
    keywords:
      - "agent"
      - "multi-agent"
      - "orchestration"
      - "autonomous"
      - "planning"
      - "tool use"
      - "function calling"
      - "agentic"
      - "workflow"
      - "self-improvement"
      - "self-evolving"
      - "evolving"
    arxiv_categories:
      - "cs.AI"
      - "cs.MA"
      - "cs.CL"
    priority: 3

  "Reinforcement Learning":
    keywords:
      - "reinforcement learning"
      - "RLHF"
      - "reward model"
      - "policy optimization"
      - "PPO"
      - "DPO"
      - "GRPO"
      - "preference learning"
      - "human feedback"
      - "alignment"
      - "reward design"
    arxiv_categories:
      - "cs.LG"
      - "cs.AI"
      - "cs.CL"
    priority: 3

  "Foundation Models & LLM":
    keywords:
      - "foundation model"
      - "large language model"
      - "LLM"
      - "pre-training"
      - "fine-tuning"
      - "PEFT"
      - "LoRA"
      - "adapter"
      - "in-context learning"
      - "reasoning"
      - "chain-of-thought"
      - "scaling law"
    arxiv_categories:
      - "cs.CL"
      - "cs.AI"
      - "cs.LG"
    priority: 3

  "AI Safety & Fairness":
    keywords:
      - "fairness"
      - "bias"
      - "robustness"
      - "adversarial"
      - "interpretability"
      - "explainability"
      - "uncertainty"
      - "calibration"
      - "out-of-distribution"
      - "trustworthy"
    arxiv_categories:
      - "cs.LG"
      - "cs.AI"
      - "cs.CY"
    priority: 2

# Excluded keywords (optional, papers containing these will be filtered out)
excluded_keywords:
  - "workshop"

# Custom common words filter list (optional)
# These words will be skipped during automatic keyword linking (wikilink replacement)
# Defaults already include common English function words and general ML terms
# extra_common_words:
#   - "dataset"
#   - "results"
